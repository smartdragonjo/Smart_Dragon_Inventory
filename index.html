<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dragon Inventory - محرك البحث</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .search-box { margin-bottom: 20px; text-align: center; }
        input { padding: 15px; width: 80%; max-width: 400px; border: 2px solid #333; border-radius: 10px; font-size: 18px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; border-radius: 10px; overflow: hidden; }
        th, td { border: 1px solid #ddd; padding: 15px; text-align: center; }
        th { background-color: #333; color: white; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">محرك بحث "التنين الذكي" لقطع الغيار</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث باسم السيارة بالعربي أو الإنجليزي..." onkeyup="filterData()">
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>الماركة</th>
                <th>الموديل</th>
                <th>السنة</th>
                <th>اللمبة (Low)</th>
                <th>اللمبة (High)</th>
                <th>الماسحات (السائق)</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <!-- سيتم عرض البيانات هنا بعد البحث فقط -->
        </tbody>
    </table>

    <script>
        let fullData = [];

        // قاموس ترجمة (يمكنك إضافة أي موديل هنا)
        const translationDict = {
            "تويوتا": "toyota", "كورولا": "corolla", "كامري": "camry", "راف فور": "rav4",
            "نيسان": "nissan", "ليف": "leaf", "فولكس فاجن": "volkswagen", "بي ام دبليو": "bmw",
            "مرسيدس": "mercedes", "فيوجن": "fusion", "فورد": "ford"
        };

        function normalizeArabic(text) {
            if (!text) return "";
            return text.toString()
                .replace(/(أ|إ|آ)/g, 'ا')
                .replace(/(ة)/g, 'ه')
                .replace(/(ى)/g, 'ي')
                .toLowerCase();
        }

        // جلب البيانات
        fetch('data.csv')
            .then(response => response.text())
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        fullData = results.data;
                        console.log("تم تحميل البيانات بنجاح:", fullData);
                    }
                });
            });

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            if (data.length === 0) {
                body.innerHTML = '<tr><td colspan="6">لم يتم العثور على نتائج.</td></tr>';
                return;
            }
            body.innerHTML = data.map(item => `
                <tr>
                    <td>${item.Make || '-'}</td>
                    <td>${item.Model || '-'}</td>
                    <td>${item.Year_Start || '-'} - ${item.Year_End || '-'}</td>
                    <td>${item.Low_Beam_Bulb || '-'}</td>
                    <td>${item.High_Beam_Bulb || '-'}</td>
                    <td>${item.Wiper_Driver_Inch || '-'}</td>
                </tr>
            `).join('');
        }

        function filterData() {
            const rawQuery = document.getElementById('searchInput').value.trim();
            const body = document.getElementById('tableBody');
            
            if (rawQuery === "") {
                body.innerHTML = ""; // إخفاء الجدول إذا لم يتم البحث
                return;
            }

            const query = normalizeArabic(rawQuery);
            const translatedQuery = translationDict[query] || query;
            
            const filtered = fullData.filter(item => 
                (item.Model && normalizeArabic(item.Model).includes(translatedQuery)) || 
                (item.Make && normalizeArabic(item.Make).includes(translatedQuery)) ||
                (item.Model && item.Model.toLowerCase().includes(translatedQuery)) || 
                (item.Make && item.Make.toLowerCase().includes(translatedQuery))
            );
            
            renderTable(filtered);
        }
    </script>
</body>
</html>
