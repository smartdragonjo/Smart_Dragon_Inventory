<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Dragon Inventory - محرك البحث</title>
    <!-- استدعاء مكتبة PapaParse من CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: Tahoma, sans-serif; padding: 20px; background-color: #f4f4f9; }
        .search-box { margin-bottom: 20px; text-align: center; }
        input { padding: 10px; width: 80%; max-width: 400px; border: 2px solid #333; border-radius: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #333; color: white; }
        .status-msg { text-align: center; padding: 20px; color: #666; }
        .error-msg { text-align: center; padding: 20px; color: #c0392b; font-weight: bold; }
    </style>
</head>
<body>

    <h1 style="text-align: center;">محرك بحث "التنين الذكي" لقطع الغيار</h1>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث باسم السيارة أو الموديل (مثال: Corolla)..." onkeyup="filterData()">
    </div>

    <table id="inventoryTable">
        <thead>
            <tr>
                <th>الماركة</th>
                <th>الموديل</th>
                <th>السنة</th>
                <th>اللمبة (Low)</th>
                <th>اللمبة (High)</th>
                <th>لمبة الضباب</th>
                <th>الماسحات (السائق)</th>
                <th>الماسحات (الراكب)</th>
                <th>مقاس الشاشة</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="9" class="status-msg">جاري تحميل البيانات...</td></tr>
        </tbody>
    </table>

    <script>
        let fullData = [];

        // جلب البيانات من ملف CSV
        fetch('data.csv')
            .then(response => {
                if (!response.ok) {
                    throw new Error('تعذر العثور على ملف data.csv (كود: ' + response.status + ')');
                }
                return response.text();
            })
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: function(results) {
                        // تجاهل أي أعمدة بدون اسم (رأس فاضي) قد تكون بآخر الملف
                        fullData = results.data.map(cleanRow);
                        renderTable(fullData);
                    },
                    error: function(err) {
                        showError('حدث خطأ أثناء تحليل ملف CSV: ' + err.message);
                    }
                });
            })
            .catch(err => {
                showError(err.message);
            });

        function cleanRow(row) {
            const cleaned = {};
            for (const key in row) {
                if (key && key.trim() !== '') {
                    cleaned[key] = (row[key] || '').toString().trim();
                }
            }
            return cleaned;
        }

        function showError(message) {
            const body = document.getElementById('tableBody');
            body.innerHTML = `<tr><td colspan="9" class="error-msg">⚠️ ${message}</td></tr>`;
        }

        function renderTable(data) {
            const body = document.getElementById('tableBody');
            if (!data || data.length === 0) {
                body.innerHTML = `<tr><td colspan="9" class="status-msg">لا توجد نتائج مطابقة</td></tr>`;
                return;
            }
            body.innerHTML = data.map(item => `
                <tr>
                    <td>${item.Make || ''}</td>
                    <td>${item.Model || ''}</td>
                    <td>${item.Year_Start || ''} - ${item.Year_End || ''}</td>
                    <td>${item.Low_Beam_Bulb || ''}</td>
                    <td>${item.High_Beam_Bulb || ''}</td>
                    <td>${item.Fog_Light_Bulb || ''}</td>
                    <td>${item.Wiper_Driver_Inch ? item.Wiper_Driver_Inch + '"' : ''}</td>
                    <td>${item.Wiper_Passenger_Inch ? item.Wiper_Passenger_Inch + '"' : ''}</td>
                    <td>${item.Screen_Frame_Type_Size || ''}</td>
                </tr>
            `).join('');
        }

        function filterData() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = fullData.filter(item => 
                (item.Model || '').toLowerCase().includes(query) || 
                (item.Make || '').toLowerCase().includes(query)
            );
            renderTable(filtered);
        }
    </script>
</body>
</html>
