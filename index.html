<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محرك بحث التنين الذكي</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; padding: 20px; background-color: #f9f9f9; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .logo { margin-top: 50px; width: 200px; }
        .tagline { color: #2e7d32; font-weight: bold; margin-bottom: 30px; font-size: 1.2rem; }
        .search-container { width: 100%; max-width: 600px; text-align: center; }
        input { padding: 15px; width: 100%; border: 1px solid #ccc; border-radius: 25px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 16px; outline: none; }
        
        #results-container { width: 100%; max-width: 600px; margin-top: 30px; }
        .card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border-right: 5px solid #2e7d32; }
        .card h3 { margin: 0 0 10px 0; color: #333; }
        .card p { margin: 5px 0; color: #555; }
        .info-label { font-weight: bold; color: #000; }
    </style>
</head>
<body>

    <img src="logo.png" alt="لوغو التنين الذكي" class="logo" onerror="this.style.display='none'">
    <div class="tagline">محرك بحث التنين الذكي عن قطع الغيار</div>
    
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="ابحث (مثال: فورد فيوجن 2019)..." oninput="filterData()">
    </div>

    <div id="results-container"></div>

    <script>
        let fullData = [];

        const manualDict = {
            "تويوتا": "toyota", "كورولا": "corolla", "كامري": "camry", "راف فور": "rav4",
            "نيسان": "nissan", "فورد": "ford", "فيوجن": "fusion", "هيونداي": "hyundai", "كيا": "kia", "تسلا": "tesla"
        };

        function normalize(text) {
            if (!text) return "";
            return text.toString().toLowerCase()
                .replace(/(أ|إ|آ)/g, 'ا').replace(/(ة)/g, 'ه').replace(/(ى)/g, 'ي');
        }

        fetch('data.csv')
            .then(response => response.text())
            .then(csvText => {
                Papa.parse(csvText, {
                    header: true,
                    skipEmptyLines: true,
                    complete: (results) => { fullData = results.data; }
                });
            });

        function filterData() {
            const rawQuery = document.getElementById('searchInput').value.trim();
            if (rawQuery === "") { document.getElementById('results-container').innerHTML = ""; return; }
            
            const queryWords = rawQuery.split(/\s+/).map(word => normalize(word));
            const container = document.getElementById('results-container');

            // محاولة استخراج أي رقم سنة من البحث
            const yearMatch = rawQuery.match(/\d{4}/);
            const searchYear = yearMatch ? parseInt(yearMatch[0]) : null;

            const filtered = fullData.filter(item => {
                const itemData = normalize(`${item.Make} ${item.Model} ${item.Arabic_Keywords || ""} ${item.Arabic_Make || ""}`);
                
                // التحقق من توافق الكلمات (الاسم)
                const nameMatches = queryWords.every(word => {
                    if (word.match(/^\d{4}$/)) return true; // تجاهل السنة في التحقق النصي
                    const translatedWord = manualDict[word] || word;
                    return itemData.includes(word) || itemData.includes(translatedWord);
                });

                // التحقق من وقوع السنة ضمن المدى إذا وجدت
                let yearMatches = true;
                if (searchYear) {
                    const startYear = parseInt(item.Year_Start);
                    const endYear = parseInt(item.Year_End);
                    yearMatches = (searchYear >= startYear && searchYear <= endYear);
                }

                return nameMatches && yearMatches;
            });

            container.innerHTML = filtered.map(item => `
                <div class="card">
                    <h3>${item.Make} ${item.Model} (${item.Year_Start} - ${item.Year_End})</h3>
                    <p><span class="info-label">اللمبة (Low):</span> ${item.Low_Beam_Bulb}</p>
                    <p><span class="info-label">اللمبة (High):</span> ${item.High_Beam_Bulb}</p>
                    <p><span class="info-label">ماسحات السائق:</span> ${item.Wiper_Driver_Inch}"</p>
                    <p><span class="info-label">ماسحات الراكب:</span> ${item.Wiper_Passenger_Inch}"</p>
                    <p><span class="info-label">الشاشة/الإطار:</span> ${item.Screen_Frame_Type_Size}</p>
                </div>
            `).join('') || '<p style="text-align:center;">لا توجد نتائج مطابقة.</p>';
        }
    </script>
</body>
</html>
